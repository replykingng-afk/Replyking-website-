<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReplyKing Properties — Premium Real Estate Lagos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>

:root {
  --gold:    #C9A84C;
  --gold-lt: #E8C97A;
  --navy:    #0B1F3A;
  --navy-lt: #122847;
  --white:   #FFFFFF;
  --off:     #F7F5F0;
  --grey:    #6B7280;
  --light:   #E5E7EB;
  --radius:  4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--navy); overflow-x: hidden; }
h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
a { text-decoration: none; color: inherit; }
img { display: block; width: 100%; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; height: 80px;
  background: rgba(11,31,58,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.2);
  transition: background 0.3s;
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-icon {
  width: 38px; height: 38px; background: var(--gold);
  border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.nav-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--white); line-height: 1.1; }
.nav-logo-text span { color: var(--gold); }
.nav-logo-sub { font-size: 9px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; display: block; margin-top: 1px; }
.nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
.nav-links a { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-cta { background: var(--gold); color: var(--navy) !important; padding: 10px 22px; border-radius: var(--radius); font-weight: 600 !important; transition: background 0.2s !important; }
.nav-cta:hover { background: var(--gold-lt) !important; }
.nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
.nav-toggle span { width: 24px; height: 2px; background: var(--white); display: block; transition: 0.3s; }

.hero {
  min-height: 100vh;
  background: linear-gradient(to bottom, rgba(11,31,58,0.75) 0%, rgba(11,31,58,0.45) 50%, rgba(11,31,58,0.85) 100%),
    url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1800&q=80') center/cover no-repeat;
  display: flex; align-items: center; padding: 0 60px; position: relative;
}
.hero-content { max-width: 700px; padding-top: 80px; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 24px; }
.hero-eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--gold); }
.hero h1 { font-size: clamp(42px, 6vw, 76px); font-weight: 900; line-height: 1.05; color: var(--white); margin-bottom: 24px; }
.hero h1 em { font-style: italic; color: var(--gold); }
.hero-desc { font-size: 17px; line-height: 1.7; color: rgba(255,255,255,0.78); max-width: 540px; margin-bottom: 40px; }
.hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }

.btn-primary { background: var(--gold); color: var(--navy); padding: 16px 36px; border-radius: var(--radius); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.2s, transform 0.2s; display: inline-block; }
.btn-primary:hover { background: var(--gold-lt); transform: translateY(-2px); }
.btn-outline { background: transparent; color: var(--white); padding: 16px 36px; border-radius: var(--radius); font-size: 14px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; border: 1.5px solid rgba(255,255,255,0.5); cursor: pointer; transition: border-color 0.2s, color 0.2s, transform 0.2s; display: inline-block; }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

.hero-stats { position: absolute; bottom: 0; left: 0; right: 0; display: flex; background: rgba(11,31,58,0.92); backdrop-filter: blur(10px); border-top: 1px solid rgba(201,168,76,0.2); }
.hero-stat { flex: 1; padding: 28px 40px; border-right: 1px solid rgba(201,168,76,0.15); text-align: center; }
.hero-stat:last-child { border-right: none; }
.hero-stat-number { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: var(--gold); line-height: 1; }
.hero-stat-label { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.55); text-transform: uppercase; margin-top: 6px; }

.search-section { background: var(--off); padding: 48px 60px; border-bottom: 1px solid var(--light); }
.search-tabs { display: flex; gap: 0; margin-bottom: 24px; }
.search-tab { padding: 10px 28px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; background: transparent; color: var(--grey); border-bottom: 2px solid transparent; transition: all 0.2s; }
.search-tab.active { color: var(--navy); border-bottom-color: var(--gold); }
.search-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 0; background: var(--white); border: 1px solid var(--light); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.search-field { padding: 18px 24px; border-right: 1px solid var(--light); }
.search-field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 6px; }
.search-field select, .search-field input { width: 100%; border: none; outline: none; font-size: 14px; color: var(--navy); font-family: 'Inter', sans-serif; font-weight: 500; background: transparent; cursor: pointer; }
.search-btn { background: var(--gold); color: var(--navy); border: none; padding: 0 36px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
.search-btn:hover { background: var(--gold-lt); }

.section { padding: 100px 60px; }
.section-alt { background: var(--off); }
.section-header { margin-bottom: 56px; }
.section-eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--gold); }
.section-title { font-size: clamp(32px, 4vw, 48px); font-weight: 700; line-height: 1.1; color: var(--navy); }
.section-title em { color: var(--gold); font-style: italic; }
.section-sub { font-size: 16px; color: var(--grey); line-height: 1.7; margin-top: 16px; max-width: 520px; }

.properties-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
.prop-card { background: var(--white); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.07); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
.prop-card:hover { transform: translateY(-8px); box-shadow: 0 16px 48px rgba(0,0,0,0.14); }
.prop-img { position: relative; height: 240px; overflow: hidden; }
.prop-img img { height: 100%; object-fit: cover; transition: transform 0.5s; }
.prop-card:hover .prop-img img { transform: scale(1.06); }
.prop-badge { position: absolute; top: 16px; left: 16px; background: var(--gold); color: var(--navy); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; }
.prop-badge.rent { background: var(--navy); color: var(--gold); }
.prop-fav { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: background 0.2s; }
.prop-body { padding: 24px; }
.prop-price { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.prop-price span { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--grey); font-weight: 400; }
.prop-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; line-height: 1.3; }
.prop-location { font-size: 13px; color: var(--grey); display: flex; align-items: center; gap: 5px; margin-bottom: 18px; }
.prop-features { display: flex; gap: 20px; padding-top: 18px; border-top: 1px solid var(--light); }
.prop-feat { font-size: 12px; color: var(--grey); display: flex; align-items: center; gap: 5px; }
.prop-feat strong { color: var(--navy); font-size: 13px; }

.featured-hero-card { display: grid; grid-template-columns: 1fr 1fr; background: var(--navy); border-radius: 12px; overflow: hidden; margin-bottom: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
.fhc-img { height: 460px; overflow: hidden; position: relative; }
.fhc-img img { height: 100%; object-fit: cover; }
.fhc-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, transparent 60%, var(--navy)); }
.fhc-body { padding: 52px 48px; display: flex; flex-direction: column; justify-content: center; }
.fhc-badge { display: inline-block; background: var(--gold); color: var(--navy); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 5px 14px; border-radius: 2px; margin-bottom: 24px; width: fit-content; }
.fhc-price { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
.fhc-title { font-size: 26px; font-weight: 700; color: var(--white); margin-bottom: 12px; line-height: 1.2; }
.fhc-loc { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 24px; display: flex; align-items: center; gap: 5px; }
.fhc-desc { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.7; margin-bottom: 32px; }
.fhc-features { display: flex; gap: 24px; margin-bottom: 36px; flex-wrap: wrap; }
.fhc-feat { text-align: center; }
.fhc-feat-num { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--gold); }
.fhc-feat-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.why-img { position: relative; }
.why-img-main { border-radius: 10px; overflow: hidden; height: 560px; }
.why-img-main img { height: 100%; object-fit: cover; }
.why-img-accent { position: absolute; bottom: -32px; right: -32px; width: 200px; border-radius: 8px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.2); border: 4px solid var(--white); }
.why-img-badge { position: absolute; top: 32px; left: -24px; background: var(--gold); color: var(--navy); padding: 20px 24px; border-radius: 8px; text-align: center; box-shadow: 0 8px 32px rgba(201,168,76,0.4); }
.why-img-badge-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; line-height: 1; }
.why-img-badge-text { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; line-height: 1.3; }
.why-features { margin-top: 40px; display: flex; flex-direction: column; gap: 28px; }
.why-feat { display: flex; gap: 20px; align-items: flex-start; }
.why-feat-icon { width: 52px; height: 52px; flex-shrink: 0; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.why-feat-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.why-feat-desc { font-size: 14px; color: var(--grey); line-height: 1.6; }

.process-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; }
.process-steps::before { content: ''; position: absolute; top: 36px; left: 10%; right: 10%; height: 1px; background: linear-gradient(to right, var(--gold), transparent); z-index: 0; }
.process-step { text-align: center; padding: 0 24px; position: relative; z-index: 1; }
.step-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--white); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--gold); box-shadow: 0 0 0 8px var(--off); }
.step-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
.step-desc { font-size: 13px; color: var(--grey); line-height: 1.6; }

.testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.testimonial-card { background: var(--white); border-radius: 10px; padding: 36px 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); border: 1px solid var(--light); position: relative; }
.testimonial-card::before { content: '"'; font-family: 'Playfair Display', serif; font-size: 80px; line-height: 0.8; color: var(--gold); opacity: 0.2; position: absolute; top: 24px; left: 28px; }
.testimonial-stars { color: var(--gold); font-size: 14px; margin-bottom: 16px; letter-spacing: 2px; }
.testimonial-text { font-size: 14px; color: var(--grey); line-height: 1.8; margin-bottom: 24px; font-style: italic; }
.testimonial-author { display: flex; align-items: center; gap: 12px; }
.testimonial-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.testimonial-name { font-size: 14px; font-weight: 700; color: var(--navy); }
.testimonial-role { font-size: 12px; color: var(--grey); margin-top: 1px; }

.cta-banner {
  background: linear-gradient(135deg, rgba(11,31,58,0.95), rgba(11,31,58,0.88)),
    url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1600&q=80') center/cover;
  padding: 100px 60px; text-align: center;
}
.cta-banner h2 { font-size: clamp(32px, 4vw, 52px); color: var(--white); margin-bottom: 16px; }
.cta-banner h2 em { color: var(--gold); font-style: italic; }
.cta-banner p { font-size: 17px; color: rgba(255,255,255,0.7); max-width: 500px; margin: 0 auto 40px; line-height: 1.7; }
.cta-banner-btns { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }

.agents-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.agent-card { text-align: center; background: var(--white); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); border: 1px solid var(--light); transition: transform 0.3s; }
.agent-card:hover { transform: translateY(-6px); }
.agent-img { height: 220px; overflow: hidden; }
.agent-img img { height: 100%; object-fit: cover; object-position: top; }
.agent-body { padding: 20px; }
.agent-name { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.agent-role { font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 14px; }
.agent-stats { display: flex; justify-content: center; gap: 20px; padding-top: 14px; border-top: 1px solid var(--light); }
.agent-stat-num { font-weight: 700; color: var(--navy); font-size: 16px; }
.agent-stat-label { font-size: 10px; color: var(--grey); text-transform: uppercase; letter-spacing: 1px; }

footer { background: var(--navy); color: rgba(255,255,255,0.7); }
.footer-top { padding: 72px 60px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.footer-brand p { font-size: 14px; line-height: 1.8; margin: 20px 0 28px; max-width: 300px; }
.footer-socials { display: flex; gap: 10px; }
.footer-social { width: 38px; height: 38px; border-radius: 6px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: background 0.2s; }
.footer-social:hover { background: var(--gold); }
.footer-col h4 { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 24px; }
.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.footer-col ul a { font-size: 14px; color: rgba(255,255,255,0.6); transition: color 0.2s; }
.footer-col ul a:hover { color: var(--gold); }
.footer-bottom { padding: 24px 60px; display: flex; align-items: center; justify-content: space-between; }
.footer-bottom p { font-size: 13px; }
.footer-bottom a { color: var(--gold); }
.powered-by { font-size: 12px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 6px; }
.powered-by a { color: var(--gold); font-weight: 600; }

@media (max-width: 1024px) {
  nav { padding: 0 30px; }
  .hero { padding: 0 30px; }
  .section { padding: 72px 30px; }
  .search-section { padding: 36px 30px; }
  .properties-grid { grid-template-columns: repeat(2, 1fr); }
  .why-grid { gap: 50px; }
  .agents-grid { grid-template-columns: repeat(2, 1fr); }
  .footer-top { grid-template-columns: 1fr 1fr; gap: 40px; padding: 48px 30px; }
  .footer-bottom { padding: 20px 30px; }
  .process-steps { grid-template-columns: repeat(2, 1fr); gap: 40px; }
  .process-steps::before { display: none; }
  .testimonials-grid { grid-template-columns: 1fr 1fr; }
  .featured-hero-card { grid-template-columns: 1fr; }
  .fhc-img { height: 300px; }
  .cta-banner { padding: 72px 30px; }
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-toggle { display: flex; }
  nav { padding: 0 20px; }
  .hero { padding: 0 20px; min-height: 90vh; }
  .hero-stats { flex-direction: column; position: relative; }
  .hero-stat { border-right: none; border-bottom: 1px solid rgba(201,168,76,0.15); padding: 20px 30px; }
  .search-section { padding: 30px 20px; }
  .search-bar { grid-template-columns: 1fr; }
  .search-field { border-right: none; border-bottom: 1px solid var(--light); }
  .search-btn { padding: 18px; justify-content: center; }
  .section { padding: 60px 20px; }
  .properties-grid { grid-template-columns: 1fr; }
  .why-grid { grid-template-columns: 1fr; }
  .why-img-accent { display: none; }
  .why-img-badge { left: 12px; top: 12px; }
  .agents-grid { grid-template-columns: 1fr 1fr; }
  .testimonials-grid { grid-template-columns: 1fr; }
  .process-steps { grid-template-columns: 1fr; }
  .footer-top { grid-template-columns: 1fr; padding: 40px 20px; }
  .footer-bottom { flex-direction: column; gap: 10px; text-align: center; padding: 20px; }
  .cta-banner { padding: 60px 20px; }
}
</style>
</head>
<body>

<nav id="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">🏠</div>
    <div>
      <div class="nav-logo-text">ReplyKing <span>Properties</span></div>
      <span class="nav-logo-sub">Premium Real Estate</span>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="#listings">Listings</a></li>
    <li><a href="#about">About Us</a></li>
    <li><a href="#process">How It Works</a></li>
    <li><a href="#agents">Our Agents</a></li>
    <li><a href="#contact" class="nav-cta">Book Inspection</a></li>
  </ul>
  <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div id="mobile-nav" style="display:none;position:fixed;top:80px;left:0;right:0;z-index:999;background:var(--navy);padding:24px 30px;border-bottom:1px solid rgba(201,168,76,0.2);flex-direction:column;gap:20px;">
  <a href="#listings" style="color:rgba(255,255,255,0.8);font-size:15px;" onclick="toggleNav()">Listings</a>
  <a href="#about" style="color:rgba(255,255,255,0.8);font-size:15
